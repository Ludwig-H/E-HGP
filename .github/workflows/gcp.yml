name: GCP infrastructure check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gcp-connection-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'devpod-gpu-exploration' }}
      GCP_INSTANCE_NAME: ${{ vars.GCP_INSTANCE_NAME || 'ehgp-blackwell-spot' }}
      GCP_ZONE: ${{ vars.GCP_ZONE || 'europe-west4-a' }}
    steps:
      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: 'projects/856038408749/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@devpod-gpu-exploration.iam.gserviceaccount.com'

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: '>= 363.0.0'

      - name: Verify identity and inspect the target VM
        run: |
          gcloud auth list --filter=status:ACTIVE --format='value(account)'
          gcloud compute instances list \
            --project="${GCP_PROJECT_ID}" \
            --filter="name=${GCP_INSTANCE_NAME} AND zone:(${GCP_ZONE})" \
            --format='table(name,zone.basename(),status,machineType.basename())'
