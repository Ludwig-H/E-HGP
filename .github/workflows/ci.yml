name: Repository checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate active documentation
        run: python tools/check_docs.py

      - name: Validate frozen data contracts
        run: python tools/check_contracts.py

      - name: Test contract validation and canonical round-trips
        run: python -m unittest discover -s tests/contracts -p 'test_*.py'

      - name: Test the independent exhaustive CPU oracle
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests/oracle -p 'test_*.py'

      - name: Run the bounded oracle campaign
        run: PYTHONDONTWRITEBYTECODE=1 python tools/run_oracle_campaign.py --ci --manifest /tmp/morsehgp3d-oracle-ci.json

      - name: Validate local references
        run: python tools/check_references.py

      - name: Reject superseded active scope
        run: python tools/check_scope.py

      - name: Validate implementation phase register
        run: python tools/check_implementation_status.py

      - name: Enforce read-only GCP workflows
        run: python tools/check_gcp_workflows.py

      - name: Test GCP safety guards
        run: python -m unittest discover -s tests/gcp -p 'test_*.py'

      - name: Validate GCP shell syntax
        run: bash -n gcp-migration/*.sh
