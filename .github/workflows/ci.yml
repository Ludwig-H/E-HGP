name: Repository checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build and test the certified CPU core
        run: |
          cmake -S morsehgp3d -B build/morsehgp3d -DMORSEHGP3D_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build/morsehgp3d --parallel 2
          ctest --test-dir build/morsehgp3d --output-on-failure

      - name: Test the installed CMake package
        run: |
          cmake --install build/morsehgp3d --prefix /tmp/morsehgp3d-install
          cmake -S morsehgp3d/tests/consumer -B build/morsehgp3d-consumer -DCMAKE_PREFIX_PATH=/tmp/morsehgp3d-install -DCMAKE_BUILD_TYPE=Release
          cmake --build build/morsehgp3d-consumer --parallel 2
          ctest --test-dir build/morsehgp3d-consumer --output-on-failure

      - name: Build the certified CPU core with Clang
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S morsehgp3d -B build/morsehgp3d-clang -DMORSEHGP3D_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build/morsehgp3d-clang --parallel 2
          ctest --test-dir build/morsehgp3d-clang --output-on-failure

      - name: Test the certified CPU core with sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: |
          cmake -S morsehgp3d -B build/morsehgp3d-sanitized -DMORSEHGP3D_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          cmake --build build/morsehgp3d-sanitized --parallel 2
          ctest --test-dir build/morsehgp3d-sanitized --output-on-failure

      - name: Validate active documentation
        run: python tools/check_docs.py

      - name: Validate frozen data contracts
        run: python tools/check_contracts.py

      - name: Test contract validation and canonical round-trips
        run: python -m unittest discover -s tests/contracts -p 'test_*.py'

      - name: Test the independent exhaustive CPU oracle
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests/oracle -p 'test_*.py'

      - name: Run the bounded oracle campaign
        run: PYTHONDONTWRITEBYTECODE=1 python tools/run_oracle_campaign.py --ci --manifest /tmp/morsehgp3d-oracle-ci.json

      - name: Validate local references
        run: python tools/check_references.py

      - name: Reject superseded active scope
        run: python tools/check_scope.py

      - name: Validate implementation phase register
        run: python tools/check_implementation_status.py

      - name: Enforce read-only GCP workflows
        run: python tools/check_gcp_workflows.py

      - name: Test GCP safety guards
        run: python -m unittest discover -s tests/gcp -p 'test_*.py'

      - name: Validate GCP shell syntax
        run: bash -n gcp-migration/*.sh
