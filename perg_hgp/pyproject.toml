[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "perg_hgp"
version = "0.1.0"
description = "Research prototype for Progressive Entropic Rank-Gabriel HGP in 3D"
readme = "README.md"
requires-python = ">=3.9"
authors = [{name = "Louis Hauseux"}]
license = "MIT"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "numpy>=1.20",
    "scipy>=1.7",
    "torch>=2.0",
    "pyyaml",
    "tqdm",
    "scikit-learn>=1.0"
]

[tool.setuptools]
packages = ["perg_hgp"]
